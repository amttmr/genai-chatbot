<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GenAI Chatbot UI</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a33;
      --muted: #90a0d0;
      --text: #eaf0ff;
      --accent: #6ea8fe;
      --user: #1f6feb;
      --bot: #23304f;
      --error: #ff6b6b;
      --border: #2a3963;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(160deg, #0a0f1e 0%, #0d1630 100%);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .app {
      width: 100%;
      max-width: 920px;
      background: rgba(18, 26, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    .topbar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }
    .title { font-weight: 600; }
    .small { color: var(--muted); font-size: 12px; }
    .control, .url-input {
      background: #0f1630;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    .url-input { width: 100%; }
    .chat {
      height: 62vh;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(9, 13, 27, 0.55);
    }
    .msg {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      line-height: 1.35;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .user { align-self: flex-end; background: var(--user); border-color: #3b83f0; }
    .bot { align-self: flex-start; background: var(--bot); }
    .error { align-self: flex-start; background: #3b1f2b; border-color: #6b2b3d; color: #ffd4da; }
    .composer {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    textarea {
      resize: vertical;
      min-height: 52px;
      max-height: 160px;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f1630;
      color: var(--text);
      font-size: 14px;
    }
    button {
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #06132e;
      font-weight: 700;
      padding: 0 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { padding: 8px 12px 0; color: var(--muted); font-size: 12px; }
    @media (max-width: 700px) {
      .topbar { grid-template-columns: 1fr; }
      .msg { max-width: 92%; }
      .composer { grid-template-columns: 1fr; }
      button { height: 44px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="title">GenAI Chatbot</div>
        <div class="small">FastAPI backend + static web UI</div>
      </div>
      <select id="model" class="control" aria-label="Model selector">
        <option value="openai">openai</option>
        <option value="gemini">gemini</option>
        <option value="groq">groq</option>
        <option value="local">local</option>
      </select>
<!--        <input id="apiBase" class="url-input" value="" aria-label="API base URL" />-->
      <input id="apiBase" class="url-input" value="https://genai-chatbot-km6h.onrender.com" aria-label="API base URL" />
    </header>

    <section id="chat" class="chat" aria-live="polite"></section>

    <div class="hint">
      Tip: Use groq from above dropdown as model for best performance.
    </div>

    <section class="composer">
      <textarea id="message" placeholder="Type your message... (Enter to send, Shift+Enter for new line)"></textarea>
      <button id="send">Send</button>
    </section>
  </main>

  <script>
    const chatEl = document.getElementById('chat');
    const messageEl = document.getElementById('message');
    const modelEl = document.getElementById('model');
    const apiBaseEl = document.getElementById('apiBase');
    const sendBtn = document.getElementById('send');

    const addMessage = (text, role = 'bot') => {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    };

    const getEndpoint = () => {
      const base = apiBaseEl.value.trim().replace(/\/$/, '');
      return `${base}/chat`;
    };

    const sendMessage = async () => {
      const message = messageEl.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      messageEl.value = '';
      sendBtn.disabled = true;

      try {
        const response = await fetch(getEndpoint(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            model: modelEl.value
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errText}`);
        }

        const data = await response.json();
        addMessage(data.response ?? '(No response field in API result)', 'bot');
      } catch (error) {
        addMessage(`Error: ${error.message}`, 'error');
      } finally {
        sendBtn.disabled = false;
        messageEl.focus();
      }
    };

    sendBtn.addEventListener('click', sendMessage);
    messageEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // addMessage('Hello! Leave API URL empty for local or enter your deployed URL and start chatting.', 'bot');
  </script>
</body>
</html>
